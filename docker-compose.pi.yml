# Raspberry Pi production override. Apply with:
#   docker compose -f docker-compose.yml -f docker-compose.pi.yml up -d
#
# Why a separate file: the app drives host WiFi (nmcli/rfkill/iw/raspi-config)
# by entering the host's namespaces via nsenter, so it needs the host PID
# namespace and broad privileges. On macOS Docker Desktop `network_mode: host`
# silently breaks port 3000 reachability — local-dev compose stays bridge mode
# so it works everywhere. Pi systemd unit + install.sh pass this file explicitly.

services:
  app:
    # The app drives host WiFi (nmcli/rfkill/iw/raspi-config) by entering the
    # host's namespaces via nsenter, so it needs the host PID namespace and
    # broad privileges. privileged + pid:host is acceptable for a single-purpose
    # appliance and can be tightened to SYS_ADMIN/SYS_PTRACE caps once verified.
    network_mode: host
    pid: "host"
    privileged: true
    # In host mode the ports stanza is ignored; clear it so Compose doesn't warn.
    ports: !reset []
