services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: familyboard:latest
    container_name: familyboard
    # Default: bridge networking. Works on macOS / Windows / Linux for local dev.
    # For Raspberry Pi production we layer docker-compose.pi.yml on top to switch
    # to host networking + nmcli/dbus bind mounts so the WiFi onboarding flow can
    # talk to the host NetworkManager. See docs/raspberry-pi-setup.md.
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
