name = "familyboard-relay"
main = "src/index.ts"
compatibility_date = "2026-07-01"

# Own subdomain (auto-creates the DNS record on the zone): clean origin for
# WAF/rate rules, no interleaving with the website or /oauth/* broker routes.
routes = [{ pattern = "relay.familyboard.ch", custom_domain = true }]

[durable_objects]
bindings = [{ name = "TUNNEL", class_name = "TunnelDO" }]

# No static asset serving: remote access is app-only. The relay is a pure API
# tunnel — every request goes to the Worker, which serves only /connect,
# /f/<id>/*, /status/<id>, /health and 404s everything else. (The former
# pairing SPA under relay/public was removed with this change.)

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TunnelDO"]
