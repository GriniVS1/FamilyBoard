name = "familyboard-oauth-broker"
main = "src/index.ts"
compatibility_date = "2026-07-01"

# Non-secret. Secrets (GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET, MS_CLIENT_ID,
# MS_CLIENT_SECRET) are set with `wrangler secret put …` — never committed.
# Azure AD app redirect URI to register: https://familyboard.ch/oauth/microsoft/callback
[vars]
BROKER_BASE_URL = "https://familyboard.ch"
# Microsoft tenant: "common" = personal + work/school accounts. Override to a
# specific tenant id or "organizations" if you only support work/school.
MS_TENANT = "common"
# App-download redirect targets for the QR codes on the wall's setup screen
# (familyboard.ch/app/ios|android — the QRs on devices never change; swap these
# and redeploy when the store listings go live). Empty string = branded
# "coming soon" page instead of a redirect.
APP_IOS_URL = "https://testflight.apple.com/join/8kQz3XyP"
APP_ANDROID_URL = ""

# Created once with: wrangler kv namespace create OAUTH_KV
# then paste the returned id here.
[[kv_namespaces]]
binding = "OAUTH_KV"
id = "08c8577b8f314d81baf72a7527073151"

# Serve only the /oauth/* and /app/* paths on the zone (leaves the website +
# updates.* alone). /app/* = the app-download QR redirects.
[[routes]]
pattern = "familyboard.ch/oauth/*"
zone_name = "familyboard.ch"

[[routes]]
pattern = "familyboard.ch/app/*"
zone_name = "familyboard.ch"
