name: familyboard_mobile
description: FamilyBoard mobile companion app (M2.1 skeleton — pairing + home stub).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  connectivity_plus: ^6.0.0
  cupertino_icons: ^1.0.6
  dio: ^5.4.0
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  flutter_secure_storage: ^9.0.0
  go_router: ^14.0.0
  intl: ^0.20.2
  mobile_scanner: ^7.0.0
  nsd: ^4.1.0
  path_provider: ^2.1.0
  sqflite: ^2.3.0

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  generate: true

# App icons are generated by the repo-root script `scripts/generate-app-icons.mjs`
# directly from inline SVG via `sharp`. To re-generate after a rebrand:
#   node scripts/generate-app-icons.mjs   # from the repo root
# The script writes Android mipmaps + adaptive foregrounds in place.
# iOS icons require the Runner/Assets.xcassets — see the script's docstring.
